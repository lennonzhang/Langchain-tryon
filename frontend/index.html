<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d4ed8" />
    <title>NVIDIA Streaming Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="chat">
        <div class="header">NVIDIA Streaming Chat</div>
        <div id="messages" class="messages"></div>
        <form id="form" class="composer">
          <label class="model-field" for="modelSelect">
            模型
            <select id="modelSelect">
              <option value="moonshotai/kimi-k2.5">moonshotai/kimi-k2.5</option>
              <option value="z-ai/glm4.7">z-ai/glm4.7</option>
            </select>
          </label>
          <label class="search-toggle" for="searchToggle">
            <input type="checkbox" id="searchToggle" />
            <span>网页搜索</span>
          </label>
          <textarea
            id="input"
            placeholder="输入内容后回车发送（Shift+Enter 换行）"
            required
          ></textarea>
          <button id="sendBtn" type="submit">发送</button>
        </form>
        <div class="tip">支持 Markdown 与 LaTeX 公式渲染，Search/Reasoning/Answer 分区显示。</div>
      </div>
    </div>
    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
