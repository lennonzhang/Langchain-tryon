<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kimi K2.5 Chat</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --ink: #10243e;
        --muted: #5f6b7a;
        --user: #0f766e;
        --assistant: #dde8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: radial-gradient(circle at top, #e8f0ff 0%, var(--bg) 55%);
        color: var(--ink);
      }

      .wrap {
        max-width: 920px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .chat {
        background: var(--panel);
        border-radius: 16px;
        box-shadow: 0 12px 36px rgba(16, 36, 62, 0.12);
        overflow: hidden;
      }

      .header {
        padding: 14px 16px;
        border-bottom: 1px solid #e8edf3;
        font-weight: 600;
      }

      .messages {
        height: 62vh;
        overflow: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 86%;
        padding: 10px 12px;
        border-radius: 12px;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .msg.user {
        align-self: flex-end;
        background: var(--user);
        color: #fff;
      }

      .msg.assistant {
        align-self: flex-start;
        background: var(--assistant);
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid #e8edf3;
      }

      textarea {
        resize: vertical;
        min-height: 52px;
        max-height: 150px;
        border: 1px solid #d8dfec;
        border-radius: 10px;
        padding: 10px;
        font: inherit;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 0 16px;
        background: #1d4ed8;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .tip {
        color: var(--muted);
        font-size: 13px;
        padding: 0 16px 14px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="chat">
        <div class="header">Basic Chat · moonshotai/kimi-k2.5</div>
        <div id="messages" class="messages"></div>
        <form id="form" class="composer">
          <textarea
            id="input"
            placeholder="输入内容后回车发送（Shift+Enter 换行）"
            required
          ></textarea>
          <button id="sendBtn" type="submit">发送</button>
        </form>
        <div class="tip">后端代理请求，不会在浏览器中暴露 API Key。</div>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const formEl = document.getElementById("form");
      const inputEl = document.getElementById("input");
      const sendBtnEl = document.getElementById("sendBtn");
      const history = [];

      function addMessage(role, content) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      async function sendMessage(text) {
        sendBtnEl.disabled = true;
        inputEl.disabled = true;
        addMessage("user", text);
        const pending = addMessage("assistant", "思考中...");

        try {
          const resp = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "请求失败");
          pending.textContent = data.answer || "(空响应)";
          history.push({ role: "user", content: text });
          history.push({ role: "assistant", content: data.answer || "" });
        } catch (err) {
          pending.textContent = `错误: ${err.message}`;
        } finally {
          sendBtnEl.disabled = false;
          inputEl.disabled = false;
          inputEl.focus();
        }
      }

      formEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = "";
        await sendMessage(text);
      });

      inputEl.addEventListener("keydown", async (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          formEl.requestSubmit();
        }
      });

      addMessage("assistant", "已连接。请输入你的问题。");
      inputEl.focus();
    </script>
  </body>
</html>
